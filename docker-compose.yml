version: "3.8"

services:
  # ── PostgreSQL Database ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vapiano-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vapiano}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-vapiano_bot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vapiano} -d ${POSTGRES_DB:-vapiano_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database Migrations ────────────────────────
  # Runs once on startup to apply Prisma schema to DB
  migrate:
    build: .
    container_name: vapiano-migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vapiano}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-vapiano_bot}?schema=public
    command: npx prisma db push --accept-data-loss
    restart: "no"

  # ── Discord Bot ────────────────────────────────
  bot:
    build: .
    container_name: vapiano-bot
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vapiano}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-vapiano_bot}?schema=public
      NODE_ENV: production
    command: node dist/bot/index.js

  # ── REST API ───────────────────────────────────
  api:
    build: .
    container_name: vapiano-api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vapiano}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-vapiano_bot}?schema=public
      NODE_ENV: production
      API_PORT: "3001"
    command: node dist/api/index.js
    expose:
      - "3001"

  # ── Web Dashboard ──────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: vapiano-dashboard
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PORT:-80}:80"

volumes:
  postgres_data:
